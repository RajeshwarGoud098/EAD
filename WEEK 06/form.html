<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
        }

        .card {
            border-radius: 15px;
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(45deg, #ff7e5f, #feb47b);
            color: white;
            text-align: center;
        }

        .btn-primary {
            background: #ff7e5f;
            border: none;
        }

        .btn-primary:hover {
            background: #e96b50;
        }

        .btn-outline-secondary {
            border-color: #2a5298;
            color: #2a5298;
        }

        .btn-outline-secondary:hover {
            background: #2a5298;
            color: white;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #ff7e5f;
            box-shadow: 0 0 5px rgba(255, 126, 95, 0.5);
        }

        .alert-success {
            background-color: #d1e7dd;
            color: #0f5132;
        }
    </style>
</head>

<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-lg">

                    <div class="card-header">
                        <h4 class="mb-0">🎓 Student Registration Form</h4>
                    </div>

                    <div class="card-body p-4 bg-white">

                        <div id="successAlert" class="alert alert-success d-none alert-dismissible fade show" role="alert">
                            Registration submitted successfully!
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <form id="regForm">
                            <div class="row g-3">

                                <div class="col-12">
                                    <label class="form-label">Student Name</label>
                                    <input type="text" class="form-control" required>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Roll Number</label>
                                    <input type="text" class="form-control" required>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" required>
                                </div>

                                <div class="col-12">
                                    <label class="form-label d-block">Gender</label>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="gender" checked>
                                        <label class="form-check-label">Male</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="gender">
                                        <label class="form-check-label">Female</label>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <label class="form-label">Department</label>
                                    <select class="form-select">
                                        <option selected disabled>Choose Department...</option>
                                        <option>CSE</option>
                                        <option>ECE</option>
                                        <option>Mechanical</option>
                                    </select>
                                </div>

                                <div class="col-12">
                                    <label class="form-label d-block">Subjects</label>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="checkbox">
                                        <label class="form-check-label">Math</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="checkbox">
                                        <label class="form-check-label">Science</label>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <label class="form-label">Upload Photo</label>
                                    <input class="form-control" type="file">
                                </div>

                                <div class="col-12 mt-4">
                                    <button type="submit" class="btn btn-primary w-100">Submit</button>
                                    <button type="reset" class="btn btn-outline-secondary w-100 mt-2">Reset</button>
                                </div>

                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('regForm').addEventListener('submit', function (e) {
            e.preventDefault();
            document.getElementById('successAlert').classList.remove('d-none');
            this.reset();
            window.scrollTo(0, 0);
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
