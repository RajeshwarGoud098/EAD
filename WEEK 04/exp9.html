<!DOCTYPE html>
<html>

<head>
    <title>Document</title>
    <style>
        header {
            background-color: rgb(122, 207, 246);
            display: flex;
            justify-content: space-between;
        }

        nav>ul {
            display: flex;
            gap: 10px;
        }

        li {
            list-style: none;
        }

        li>ul {
            position: absolute;
            display: none;
            background-color: rgb(27, 56, 62);
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dropdown:hover ul {
            display: block;
        }

        ul {
            padding: 0;
        }

        .dropdown {
            position: relative;
        }

        .dropdown>ul>li {
            padding: 10px;
            width: 2.5cm;
        }
    </style>
</head>

<body>
    <header>
        <h1>CBIT</h1>
        <nav>
            <ul>
                <li>Home</li>
                <li>Explore</li>
                <li class="dropdown">
                    Contact Us
                    <ul style="color: white;">
                        <li>About Me</li>
                        <li>About Us</li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>
</body>

</html>
